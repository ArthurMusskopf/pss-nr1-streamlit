name: Apply UX polish

on:
  push:
    paths:
      - '.github/workflows/apply-ux-polish.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch app.py layout hooks
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('app.py')
          text = path.read_text(encoding='utf-8')

          new_css = '''def css() -> None:
    style_path = ASSETS_DIR / "styles.css"
    if style_path.exists():
        style = style_path.read_text(encoding="utf-8")
    else:
        style = """
        .stApp { background: #A8A5A2; }
        .pss-card { background: #EDEDEC; }
        """
    st.markdown(f"<style>{style}</style>", unsafe_allow_html=True)
'''

          text, n = re.subn(
              r'def css\(\) -> None:\n    st\.markdown\(.*?\n\n\ndef get_bq_client',
              new_css + '\n\ndef get_bq_client',
              text,
              count=1,
              flags=re.S,
          )
          if n != 1:
              raise SystemExit('Could not replace css() function')

          new_result_buttons = '''    c0, c1, c2, c3 = st.columns([1.0, 1.25, 1.8, 1.0])
    with c1:
        st.download_button(
            "Download do certificado",
            data=payload["pdf_bytes"],
            file_name=f"certificado_{payload['certificado_id']}.pdf",
            mime="application/pdf",
            use_container_width=True,
        )
    with c2:
        st.download_button(
            "Download dos resultados e Matriz de Ações",
            data=payload["excel_bytes"],
            file_name=payload["excel_name"],
            mime="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet",
            use_container_width=True,
        )
'''
          text, n = re.subn(
              r'    d1, d2 = st\.columns\(2\)\n    with d1:\n        st\.download_button\(.*?\n\n\ndef footer',
              new_result_buttons + '\n\ndef footer',
              text,
              count=1,
              flags=re.S,
          )
          if n != 1:
              raise SystemExit('Could not replace result buttons')

          text = text.replace(
              '        if st.button("Novo preenchimento", use_container_width=True):\n            reset_state()',
              '        n0, n1, n2 = st.columns([1.6, 1.0, 1.6])\n        with n1:\n            if st.button("Novo preenchimento", use_container_width=True):\n                reset_state()'
          )

          path.write_text(text, encoding='utf-8')
          PY

      - name: Remove temporary write test if present
        run: |
          rm -f test_write.txt

      - name: Commit polish changes
        run: |
          git config user.name "chatgpt-codex-connector"
          git config user.email "chatgpt-codex-connector@users.noreply.github.com"
          git add app.py assets/styles.css
          git rm -f test_write.txt 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Centraliza estilos e polimenta UX final"
            git push
          fi
