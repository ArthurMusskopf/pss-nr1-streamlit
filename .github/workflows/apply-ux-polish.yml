name: Apply UX polish

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fix app indentation and cleanup
        run: |
          python - <<'PY'
          from pathlib import Path

          p = Path('app.py')
          lines = p.read_text(encoding='utf-8').splitlines()

          start = None
          end = None
          for i, line in enumerate(lines):
              if line.startswith('c0, c1, c2, c3 = st.columns'):
                  start = i
              if start is not None and line.startswith('def footer()'):
                  end = i
                  break

          if start is not None and end is not None:
              for i in range(start, end):
                  if lines[i].strip():
                      lines[i] = '    ' + lines[i]
              p.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          else:
              print('No top-level result button block found; nothing to indent.')
          PY

      - name: Remove temporary write test if present
        run: |
          rm -f test_write.txt

      - name: Commit polish changes
        run: |
          git config user.name "chatgpt-codex-connector"
          git config user.email "chatgpt-codex-connector@users.noreply.github.com"
          git add app.py
          git rm -f test_write.txt 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Corrige render result e limpa teste"
            git push
          fi
